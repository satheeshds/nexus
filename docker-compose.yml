services:
  # Metadata Catalog
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lake_catalog
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"

  # S3 Storage
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data

  # BoilStream Gateway
  boilstream:
    image: boilingdata/boilstream:latest
    depends_on:
      - postgres
      - minio
    ports:
      - "8080:8080" # Management API/UI
      - "5433:5432" # Postgres-compatible Query Port
    volumes:
      - ./boilstream.yaml:/etc/boilstream/config.yaml
    environment:
      BOILSTREAM_CONFIG: /etc/boilstream/config.yaml

volumes:
  minio_data: