services:

  # ── Metadata Catalog ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-lake_catalog}
      POSTGRES_USER:     ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-lake_catalog}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Object Storage ───────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Bootstrap MinIO bucket ───────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
      LAKEHOUSE_BUCKET:    ${LAKEHOUSE_BUCKET:-lakehouse}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done;
      /usr/bin/mc mb myminio/$${LAKEHOUSE_BUCKET} --ignore-existing;
      echo 'MinIO bucket ready';
      exit 0;
      "

  # ── Nexus Control Plane ──────────────────────────────────────────────────────
  nexus-control:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.control
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      NEXUS_POSTGRES_HOST:     postgres
      NEXUS_POSTGRES_PORT:     5432
      NEXUS_POSTGRES_USER:     ${POSTGRES_USER:-nexus}
      NEXUS_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      NEXUS_POSTGRES_DBNAME:   ${POSTGRES_DB:-lake_catalog}
      NEXUS_MINIO_ENDPOINT:    minio:9000
      NEXUS_MINIO_ACCESS_KEY:  ${MINIO_ROOT_USER:-minioadmin}
      NEXUS_MINIO_SECRET_KEY:  ${MINIO_ROOT_PASSWORD:-changeme}
      NEXUS_MINIO_BUCKET:      ${LAKEHOUSE_BUCKET:-lakehouse}
      NEXUS_AUTH_JWT_SECRET:   ${JWT_SECRET:-supersecretkey_change_in_production}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nexus Query Gateway (pgwire) ─────────────────────────────────────────────
  nexus-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nexus-control:
        condition: service_healthy
    ports:
      - "5433:5433"   # Postgres-wire query endpoint
    environment:
      NEXUS_POSTGRES_HOST:     postgres
      NEXUS_POSTGRES_PORT:     5432
      NEXUS_POSTGRES_USER:     ${POSTGRES_USER:-nexus}
      NEXUS_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      NEXUS_POSTGRES_DBNAME:   ${POSTGRES_DB:-lake_catalog}
      NEXUS_MINIO_ENDPOINT:    minio:9000
      NEXUS_MINIO_ACCESS_KEY:  ${MINIO_ROOT_USER:-minioadmin}
      NEXUS_MINIO_SECRET_KEY:  ${MINIO_ROOT_PASSWORD:-changeme}
      NEXUS_MINIO_BUCKET:      ${LAKEHOUSE_BUCKET:-lakehouse}
      NEXUS_AUTH_JWT_SECRET:   ${JWT_SECRET:-supersecretkey_change_in_production}
      NEXUS_GATEWAY_PORT:      5433

volumes:
  postgres_data:
  minio_data:
