services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       lake_catalog_test
      POSTGRES_USER:     nexus_test
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # ephemeral; wiped when container stops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_test -d lake_catalog_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-test:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin_test
      MINIO_ROOT_PASSWORD: testpassword
    ports:
      - "9002:9000"   # Use 9002 to avoid conflict with dev stack on 9000
    tmpfs:
      - /data  # ephemeral; wiped when container stops
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-test-init:
    image: minio/mc:latest
    depends_on:
      minio-test:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     minioadmin_test
      MINIO_ROOT_PASSWORD: testpassword
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set testminio http://minio-test:9000 minioadmin_test testpassword; do sleep 1; done;
      /usr/bin/mc mb testminio/lakehouse-test --ignore-existing;
      echo 'MinIO test bucket ready';
      exit 0;
      "
